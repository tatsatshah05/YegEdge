# NSE supplemental holidays not captured by the XBOM exchange-calendars base.
# These are official NSE equity-segment holiday announcements.
# Source: https://www.nseindia.com/resources/exchange-communication-holidays
# Update annually before the new trading year begins.
#
# Format: YYYY-MM-DD — one date per line under the relevant year.
# These dates are ADDED to (not replacing) the XBOM base calendar.

2024:
  - "2024-01-01"   # New Year's Day
  - "2024-01-22"   # Ram Mandir Consecration (special holiday)

